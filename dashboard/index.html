<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Klarr</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=18">
  <link rel="stylesheet" href="/css/dashboard.css?v=4">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js?042c9428"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js?042c9428"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js?042c9428"></script>
</head>
<body>
<div class="toast-container" id="toast-container"></div>

<div class="dash-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="dash-sidebar" id="sidebar">
    <div class="brand"><a href="/"><img src="/favicon.svg" alt="Klarr"> Klarr</a></div>
    <div class="nav-section">
      <a href="/dashboard" class="active"><span class="nav-icon">📊</span> Overview</a>
      <a href="/dashboard/reports"><span class="nav-icon">📄</span> Reports</a>
      <a href="/dashboard/upload"><span class="nav-icon">📤</span> Upload Data</a>
      <a href="/dashboard/billing"><span class="nav-icon">💳</span> Billing</a>
    </div>
    <div class="nav-section" id="partner-nav" style="display:none;">
      <div class="nav-label">Partner</div>
      <a href="/dashboard/partner"><span class="nav-icon">🤝</span> Partner Dashboard</a>
    </div>
    <div class="nav-section">
      <a href="/dashboard/settings"><span class="nav-icon">⚙️</span> Settings</a>
      <a href="/partners"><span class="nav-icon">📢</span> Partner Program</a>
    </div>
  </div>
  <div class="dash-main" id="dash-content">
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--text-dim);">
      <div style="text-align:center;"><div style="font-size:32px;margin-bottom:12px;animation:pulse 1.5s infinite;">⏳</div><p>Loading your dashboard...</p></div>
    </div>
  </div>
</div>

<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}</style>

<script>
// Initialize Firebase
var firebaseConfig = {
  apiKey: "AIzaSyB65lbtE-2TbfC6XzQ8_zHsu-zh0ch4UR4",
  authDomain: "klarr-fa508.firebaseapp.com",
  projectId: "klarr-fa508",
  storageBucket: "klarr-fa508.firebasestorage.app",
  messagingSenderId: "1059958349807",
  appId: "1:1059958349807:web:56a25844725fce7183e01a",
  measurementId: "G-JEDM340TC4"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

// Toast system
function showToast(msg, type) {
  var c = document.getElementById('toast-container');
  if (!c) { alert(msg); return; }
  var t = document.createElement('div');
  t.className = 'toast ' + (type || 'info');
  t.innerHTML = (type==='success'?'✅ ':type==='error'?'❌ ':'ℹ️ ') + msg;
  c.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},300);},4000);
}

// Auth state listener
auth.onAuthStateChanged(async function(user) {
  if (!user) { window.location.href = '/login'; return; }

  // Handle Stripe payment success
  var params = new URLSearchParams(window.location.search);
  if (params.get('payment') === 'success' && params.get('plan')) {
    try {
      await db.collection('customers').doc(user.uid).update({
        plan: params.get('plan'), planStartedAt: firebase.firestore.FieldValue.serverTimestamp(), status: 'active'
      });
      window.history.replaceState({}, '', '/dashboard');
      showToast('🎉 Payment successful! Your ' + params.get('plan') + ' plan is now active.', 'success');
    } catch (e) { showToast('Error: ' + e.message, 'error'); }
  }

  // Load profile
  var profile = { name: 'there', plan: 'none', email: user.email, status: 'active' };
  try {
    var doc = await db.collection('customers').doc(user.uid).get();
    if (doc.exists) profile = Object.assign(profile, doc.data());
  } catch(e) {}

  // Check if partner
  var isPartner = false;
  var partnerData = null;
  try {
    var snap = await db.collection('partners').where('email','==',user.email).get();
    if (!snap.empty) { isPartner = true; partnerData = snap.docs[0].data(); document.getElementById('partner-nav').style.display = 'block'; }
  } catch(e) {}

  var isActive = profile.plan && profile.plan !== 'none';
  var planLabel = isActive ? profile.plan.charAt(0).toUpperCase() + profile.plan.slice(1) + ' Plan' : 'No active plan';
  var planValue = isActive ? profile.plan.charAt(0).toUpperCase() + profile.plan.slice(1) : '—';
  var initials = profile.name.split(' ').map(function(n){return n[0];}).join('').toUpperCase().substring(0,2);

  var html = '';
  html += '<div class="page-header"><div><h1>Welcome, ' + profile.name.split(' ')[0] + ' 👋</h1><p class="page-subtitle">Here\'s your bookkeeping overview.</p></div><span class="badge ' + (isActive ? 'active' : 'pending') + '">' + (isActive ? '● Active' : '○ Get started') + '</span></div>';

  html += '<div class="stats-grid">';
  html += '<div class="stat-card accent"><div class="label">Current Plan</div><div class="value">' + planValue + '</div><div class="sub">' + planLabel + '</div></div>';
  html += '<div class="stat-card"><div class="label">Reports This Month</div><div class="value">0</div><div class="sub">' + (isActive ? 'Upload your first data' : 'Upgrade to get started') + '</div></div>';
  if (isPartner) html += '<div class="stat-card"><div class="label">Referral Earnings</div><div class="value">$0.00/mo</div><div class="sub"><a href="/dashboard/partner" style="color:var(--accent);">View partner dashboard →</a></div></div>';
  html += '<div class="stat-card"><div class="label">Next Delivery</div><div class="value">—</div><div class="sub">After first upload</div></div>';
  html += '</div>';

  html += '<div class="panel"><div class="panel-header"><h2>🚀 Get Started</h2></div><p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.6;">Export your orders, payouts, and fees from Shopify and upload them here. We\'ll deliver your P&L, Balance Sheet, and Cash Flow within 24 hours.</p><div style="display:flex;gap:8px;flex-wrap:wrap;"><a href="/dashboard/upload" class="btn primary">📤 Upload Data</a><a href="/tools" class="btn">🏥 Free Health Check</a>';
  if (!isActive) html += '<a href="/#pricing" class="btn accent">💎 Upgrade Plan</a>';
  html += '</div></div>';

  if (isPartner) {
    html += '<div class="panel" style="border-color:rgba(192,133,50,0.2);"><div class="panel-header"><h2>🤝 Partner Program</h2></div><p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">You\'re a Klarr partner! Share your referral link and earn 20% recurring commission.</p><div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;"><input type="text" value="https://klarr.space/?ref=' + partnerData.id + '" readonly class="form-control" style="flex:1;font-size:12px;" id="ref-link"><button class="btn sm" onclick="navigator.clipboard.writeText(document.getElementById(\'ref-link\').value);showToast(\'Referral link copied!\',\'success\');">📋 Copy</button></div><a href="/dashboard/partner" class="btn accent sm">Open Partner Dashboard →</a></div>';
  }

  html += '<div class="panel"><div class="panel-header"><h2>📄 Your Reports</h2></div><div class="empty-state"><div class="empty-icon">📊</div><h3>No reports yet</h3><p>Once you upload your Shopify data, your monthly reports will appear here. We deliver P&L, Balance Sheet, and Cash Flow within 24 hours.</p><a href="/dashboard/upload" class="btn primary" style="margin-top:16px;">Upload Your First Data</a></div></div>';

  html += '<div class="panel"><div class="panel-header"><h2>📬 How You Receive Your Work</h2></div><div class="grid-3"><div class="info-card"><div class="info-icon">📊</div><h3>Profit & Loss</h3><p>Monthly P&L with every transaction categorized</p></div><div class="info-card"><div class="info-icon">📋</div><h3>Balance Sheet</h3><p>Assets, liabilities, and equity — always up to date</p></div><div class="info-card"><div class="info-icon">💵</div><h3>Cash Flow</h3><p>See why cash is tight even when sales are up</p></div></div><p style="font-size:12px;color:var(--text-dim);margin-top:16px;text-align:center;">All reports delivered as clean Google Sheets within 24 hours of upload</p></div>';

  html += '<div class="panel"><div class="panel-header"><h2>👤 Account</h2></div><div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;"><div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a06828);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--bg);">' + initials + '</div><div><div style="font-size:14px;color:var(--text);font-weight:500;">' + profile.name + '</div><div style="font-size:12px;color:var(--text-dim);">' + profile.email + '</div></div></div><a href="/dashboard/settings" class="btn sm">✏️ Edit Profile</a></div>';

  document.getElementById('dash-content').innerHTML = html;
});
</script>
</body>
</html>
