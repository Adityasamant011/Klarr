<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Klarr</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=17">
  <link rel="stylesheet" href="/css/dashboard.css?v=3">
</head>
<body>
<div class="toast-container" id="toast-container"></div>

<div class="dash-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="dash-sidebar" id="sidebar">
    <div class="brand"><a href="/"><img src="/favicon.svg" alt="Klarr"> Klarr</a></div>
    <div class="nav-section">
      <a href="/dashboard"><span class="nav-icon">📊</span> Overview</a>
      <a href="/dashboard/reports"><span class="nav-icon">📄</span> Reports</a>
      <a href="/dashboard/upload"><span class="nav-icon">📤</span> Upload Data</a>
      <a href="/dashboard/billing"><span class="nav-icon">💳</span> Billing</a>
    </div>
    <div class="nav-section">
      <a href="/dashboard/settings" class="active"><span class="nav-icon">⚙️</span> Settings</a>
      <a href="/partners"><span class="nav-icon">🤝</span> Partner Program</a>
    </div>
  </div>
  <div class="dash-main">
    <div class="page-header">
      <div><h1>⚙️ Settings</h1><p class="page-subtitle">Manage your account</p></div>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>👤 Profile</h2></div>
      <form id="profile-form">
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" class="form-control" id="set-name" placeholder="Your name" required></div>
          <div class="form-group"><label>Email</label><input type="email" class="form-control" id="set-email" disabled></div>
        </div>
        <button type="submit" class="btn primary" id="btn-save-profile">💾 Save Changes</button>
      </form>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>🔒 Change Password</h2></div>
      <form id="password-form" style="max-width:420px;">
        <div class="form-group"><label>Current Password</label><input type="password" class="form-control" id="curr-pass" required placeholder="Enter current password"></div>
        <div class="form-group"><label>New Password</label><input type="password" class="form-control" id="new-pass" required minlength="6" placeholder="Min 6 characters"></div>
        <div class="form-group"><label>Confirm New Password</label><input type="password" class="form-control" id="conf-pass" required placeholder="Repeat new password"></div>
        <button type="submit" class="btn primary" id="btn-save-pass">🔑 Update Password</button>
      </form>
    </div>

    <div class="panel" style="border-color:rgba(224,80,80,0.2);">
      <div class="panel-header"><h2>🛡️ Danger Zone</h2></div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.6;">Once you delete your account, there is no going back. All your data will be permanently removed.</p>
      <button class="btn danger" id="btn-delete">🗑️ Delete Account</button>
    </div>
  </div>
</div>

<script type="module">
  import { auth, onAuthStateChanged, getCustomerProfile } from 'https://klarr.space/partners/firebase-init.js';
  import { getFirestore, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { updateNav, requireAuth } from 'https://klarr.space/auth.js';

  var db = getFirestore();
  updateNav();
  requireAuth('/login');

  window.showToast = function(msg, type) {
    var c = document.getElementById('toast-container');
    if (!c) { alert(msg); return; }
    var t = document.createElement('div');
    t.className = 'toast ' + (type || 'info');
    t.innerHTML = (type==='success'?'✅ ':type==='error'?'❌ ':'ℹ️ ') + msg;
    c.appendChild(t);
    setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},300);},4000);
  };

  onAuthStateChanged(auth, async function(user) {
    if (!user) return;
    var profile = { name: '', email: user.email };
    try { var p = await getCustomerProfile(user.uid); if (p) Object.assign(profile, p); } catch(e) {}
    document.getElementById('set-name').value = profile.name;
    document.getElementById('set-email').value = user.email;

    // Save profile
    document.getElementById('profile-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = document.getElementById('btn-save-profile');
      btn.disabled = true; btn.textContent = '⏳ Saving...';
      try {
        await updateDoc(doc(db, 'customers', user.uid), { name: document.getElementById('set-name').value.trim() });
        showToast('Profile updated successfully!', 'success');
      } catch(err) {
        showToast('Error: ' + err.message, 'error');
      }
      btn.disabled = false; btn.textContent = '💾 Save Changes';
    });

    // Change password
    document.getElementById('password-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var np = document.getElementById('new-pass').value;
      var cp = document.getElementById('conf-pass').value;
      if (np !== cp) { showToast('Passwords do not match', 'error'); return; }
      if (np.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
      showToast('Password change requires re-authentication. Please log in again to change your password.', 'info');
    });

    // Delete account
    document.getElementById('btn-delete').addEventListener('click', async function() {
      if (!confirm('⚠️ Are you sure you want to delete your account? This cannot be undone.')) return;
      if (!confirm('This will permanently delete all your data. Type "DELETE" to confirm.')) return;
      showToast('Account deletion is not available in demo mode.', 'info');
    });
  });
</script>
</body>
</html>
