<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | Klarr</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=18">
  <link rel="stylesheet" href="/css/dashboard.css?v=4">
</head>
<body>
<div class="toast-container" id="toast-container"></div>
<div class="dash-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="dash-sidebar" id="sidebar">
    <div class="brand"><a href="/"><img src="/favicon.svg" alt="Klarr"><span>Klarr</span></a></div>
    <div class="nav-section">
      <a href="/dashboard"><span class="nav-icon">📊</span> Overview</a>
      <a href="/dashboard/reports"><span class="nav-icon">📄</span> Reports</a>
      <a href="/dashboard/upload"><span class="nav-icon">📤</span> Upload Data</a>
      <a href="/dashboard/billing"><span class="nav-icon">💳</span> Billing</a>
    </div>
    <div class="nav-section" id="partner-nav" style="display:none;">
      <div class="nav-label">Partner</div>
      <a href="/dashboard/partner"><span class="nav-icon">🤝</span> Partner Dashboard</a>
    </div>
    <div class="nav-section">
      <a href="/dashboard/settings" class="active"><span class="nav-icon">⚙️</span> Settings</a>
      <a href="/partners"><span class="nav-icon">📢</span> Partner Program</a>
    </div>
  </div>
  <div class="dash-main">
    <div class="page-header"><div><h1>⚙️ Settings</h1><p class="page-subtitle">Manage your account</p></div></div>
    <div class="panel">
      <div class="panel-header"><h2>👤 Profile</h2></div>
      <form id="profile-form">
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" class="form-control" id="set-name" placeholder="Your name" required></div>
          <div class="form-group"><label>Email</label><input type="email" class="form-control" id="set-email" disabled></div>
        </div>
        <button type="submit" class="btn primary" id="btn-save-profile">💾 Save Changes</button>
      </form>
    </div>
    <div class="panel">
      <div class="panel-header"><h2>🔒 Change Password</h2></div>
      <form id="password-form" style="max-width:420px;">
        <div class="form-group"><label>Current Password</label><input type="password" class="form-control" id="curr-pass" required placeholder="Enter current password"></div>
        <div class="form-group"><label>New Password</label><input type="password" class="form-control" id="new-pass" required minlength="6" placeholder="Min 6 characters"></div>
        <div class="form-group"><label>Confirm New Password</label><input type="password" class="form-control" id="conf-pass" required placeholder="Repeat new password"></div>
        <button type="submit" class="btn primary" id="btn-save-pass">🔑 Update Password</button>
      </form>
    </div>
    <div class="panel" style="border-color:rgba(224,80,80,0.2);">
      <div class="panel-header"><h2>🛡️ Danger Zone</h2></div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.6;">Once you delete your account, there is no going back. All your data will be permanently removed.</p>
      <button class="btn danger" id="btn-delete">🗑️ Delete Account</button>
    </div>
  </div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
var firebaseConfig = {apiKey:"AIzaSyB65lbtE-2TbfC6XzQ8_zHsu-zh0ch4UR4",authDomain:"klarr-fa508.firebaseapp.com",projectId:"klarr-fa508",storageBucket:"klarr-fa508.firebasestorage.app",messagingSenderId:"1059958349807",appId:"1:1059958349807:web:56a25844725fce7183e01a",measurementId:"G-JEDM340TC4"};
function initApp() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    var db = firebase.firestore();
    window.showToast = function(msg, type) {
      var c = document.getElementById('toast-container');
      if (!c) { alert(msg); return; }
      var t = document.createElement('div');
      t.className = 'toast ' + (type || 'info');
      t.innerHTML = (type==='success'?'✅ ':type==='error'?'❌ ':'ℹ️ ') + msg;
      c.appendChild(t);
      setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},300);},4000);
    };
    auth.onAuthStateChanged(async function(user) {
      if (!user) { window.location.href = '/login'; return; }
      try {
        var snap = await db.collection('partners').where('email','==',user.email).get();
        if (!snap.empty) document.getElementById('partner-nav').style.display = 'block';
      } catch(e) {}
      var profile = { name: '', email: user.email };
      try { var doc = await db.collection('customers').doc(user.uid).get(); if (doc.exists) Object.assign(profile, doc.data()); } catch(e) {}
      document.getElementById('set-name').value = profile.name;
      document.getElementById('set-email').value = user.email;
      document.getElementById('profile-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var btn = document.getElementById('btn-save-profile');
        btn.disabled = true; btn.textContent = '⏳ Saving...';
        try {
          await db.collection('customers').doc(user.uid).update({ name: document.getElementById('set-name').value.trim() });
          showToast('Profile updated!', 'success');
        } catch(err) { showToast('Error: ' + err.message, 'error'); }
        btn.disabled = false; btn.textContent = '💾 Save Changes';
      });
      document.getElementById('password-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        var np = document.getElementById('new-pass').value;
        var cp = document.getElementById('conf-pass').value;
        if (np !== cp) { showToast('Passwords do not match', 'error'); return; }
        if (np.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
        try {
          await auth.currentUser.updatePassword(np);
          showToast('Password updated!', 'success');
          document.getElementById('curr-pass').value = '';
          document.getElementById('new-pass').value = '';
          document.getElementById('conf-pass').value = '';
        } catch(err) {
          if (err.code === 'auth/requires-recent-login') showToast('Please log in again to change password.', 'error');
          else showToast('Error: ' + err.message, 'error');
        }
      });
      document.getElementById('btn-delete').addEventListener('click', function() {
        if (!confirm('⚠️ Are you sure? This cannot be undone.')) return;
        showToast('Account deletion is not available in demo mode.', 'info');
      });
    });
  } catch(e) { console.error(e); }
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initApp);
else initApp();
</script>
</body>
</html>
