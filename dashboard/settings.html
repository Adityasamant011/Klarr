  <symbol id="icon-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></symbol>

<div class="dash-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="dash-sidebar" id="sidebar">
    <div class="brand"><a href="/"><img src="/favicon.svg" alt="Klarr"> Klarr</a></div>
    <div class="section-label">Main</div>
    <a href="/dashboard.html">📊 Overview</a>
    <a href="/dashboard/reports.html">📄 Reports</a>
    <a href="/dashboard/upload.html">📤 Upload Data</a>
    <a href="/dashboard/billing.html">💳 Billing</a>
    <div class="section-label">Account</div>
    <a href="/dashboard/settings.html" class="active">⚙️ Settings</a>
    <a href="/partners/">🤝 Partner Program</a>
  </div>

  <div class="dash-main">
    <div class="dash-topbar">
      <div><h1>Settings</h1><p class="subtitle">Manage your account.</p></div>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>Profile</h2></div>
      <form id="profile-form">
        <div class="form-row">
          <div class="form-group"><label>Full Name</label><input type="text" class="form-control" id="set-name" placeholder="Your name"></div>
          <div class="form-group"><label>Email</label><input type="email" class="form-control" id="set-email" disabled></div>
        </div>
        <button type="submit" class="btn primary">Save Changes</button>
      </form>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>Change Password</h2></div>
      <form id="password-form" style="max-width:400px;">
        <div class="form-group"><label>Current Password</label><input type="password" class="form-control" id="curr-pass" required></div>
        <div class="form-group"><label>New Password</label><input type="password" class="form-control" id="new-pass" required minlength="6"></div>
        <div class="form-group"><label>Confirm New Password</label><input type="password" class="form-control" id="conf-pass" required></div>
        <button type="submit" class="btn primary">Update Password</button>
      </form>
    </div>

    <div class="panel">
      <div class="panel-header"><h2>Danger Zone</h2></div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Once you delete your account, there is no going back.</p>
      <button class="btn danger" id="delete-btn">Delete Account</button>
    </div>
  </div>
</div>

<script type="module">
  import { auth, onAuthStateChanged, getCustomerProfile } from '/partners/firebase-init.js';
  import { getFirestore, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { updateNav, requireAuth } from '/auth.js';
  const db = getFirestore();
  updateNav(); requireAuth('/login.html');

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    const profile = await getCustomerProfile(user.uid) || {};
    document.getElementById('set-name').value = profile.name || '';
    document.getElementById('set-email').value = user.email;

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      await updateDoc(doc(db, 'customers', user.uid), { name: document.getElementById('set-name').value });
      alert('Profile updated!');
    });

    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const np = document.getElementById('new-pass').value;
      const cp = document.getElementById('conf-pass').value;
      if (np !== cp) { alert('Passwords do not match'); return; }
      alert('Password change requires re-authentication. This is a demo.');
    });

    document.getElementById('delete-btn').addEventListener('click', () => {
      if (confirm('Are you sure? This cannot be undone.')) {
        alert('Account deletion is disabled in demo mode.');
      }
    });
  });
</script>
</body>
</html>
