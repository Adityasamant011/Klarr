</head>
<body>

<!-- Icons -->

  <symbol id="icon-wallet" viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4h-4z"/></symbol>
  <symbol id="icon-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></symbol>
  <symbol id="icon-reports" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></symbol>
  <symbol id="icon-upload" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></symbol>
  <symbol id="icon-billing" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></symbol>
  <symbol id="icon-logout" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></symbol>
  <symbol id="icon-home" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>
  <symbol id="icon-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
  <symbol id="icon-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
  <symbol id="icon-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></symbol>
  <symbol id="icon-x" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
  <symbol id="icon-alert" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></symbol>
  <symbol id="icon-mail" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></symbol>
  <symbol id="icon-shield" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
  <symbol id="icon-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></symbol>
  <symbol id="icon-dollar" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></symbol>
  <symbol id="icon-arrow-right" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></symbol>
  <symbol id="icon-menu" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></symbol>
  <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
  <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
  <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></symbol>
  <symbol id="icon-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
  <symbol id="icon-refresh" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></symbol>
  <symbol id="icon-file" viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></symbol>
  <symbol id="icon-activity" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></symbol>
</svg>

<div class="dash-layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="dash-sidebar" id="sidebar">
    <div class="brand"><a href="/"><img src="/favicon.svg" alt="Klarr"> Klarr</a></div>
    <div class="section-label">Main</div>
    <a href="/dashboard" class="active" id="nav-overview">📊 Overview</a>
    <a href="/dashboard/reports" id="nav-reports">📄 Reports</a>
    <a href="/dashboard/upload" id="nav-upload">📤 Upload Data</a>
    <a href="/dashboard/billing" id="nav-billing">💳 Billing</a>
    <div class="section-label">Account</div>
    <a href="/dashboard/settings" id="nav-settings">⚙️ Settings</a>
    <a href="/partners/">🤝 Partner Program</a>
  </div>

  <div class="dash-main" id="dash-content">
    <div style="text-align:center;padding:60px;color:var(--text-dim);">Loading...</div>
  </div>
</div>

<script type="module">
  import { auth, onAuthStateChanged, signOut, getCustomerProfile } from '/partners/firebase-init.js';
  import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { doc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
  import { updateNav, requireAuth, doLogout } from '/auth.js';

  const db = getFirestore();
  updateNav();
  requireAuth('/login');

  // Mobile menu
  document.querySelector('.mobile-menu-btn')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
  });
  document.getElementById('sidebar-overlay')?.addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  });

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;

    // Handle Stripe payment success redirect
    const params = new URLSearchParams(window.location.search);
    if (params.get('payment') === 'success' && params.get('plan')) {
      try {
        await updateDoc(doc(db, 'customers', user.uid), {
          plan: params.get('plan'), planStartedAt: serverTimestamp(), status: 'active'
        });
        window.history.replaceState({}, '', '/dashboard');
      } catch (e) { console.error('Plan update failed:', e); }
    }

    // Load profile
    let profile = { name: 'there', plan: 'none', email: user.email };
    try {
      const p = await getCustomerProfile(user.uid);
      if (p) profile = { ...profile, ...p };
    } catch (e) {}

    const planLabel = profile.plan && profile.plan !== 'none' ? profile.plan.charAt(0).toUpperCase() + profile.plan.slice(1) + ' Plan' : 'No active plan';
    const isActive = profile.plan && profile.plan !== 'none';

    document.getElementById('dash-content').innerHTML = `
      <div class="dash-topbar">
        <div>
          <h1>Welcome, ${profile.name.split(' ')[0]}</h1>
          <p class="subtitle">Here's your bookkeeping overview.</p>
        </div>
        <span class="badge ${isActive ? 'active' : 'pending'}">${isActive ? 'Active' : 'Get started'}</span>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Current Plan</div>
          <div class="value">${profile.plan === 'none' ? '—' : profile.plan.charAt(0).toUpperCase() + profile.plan.slice(1)}</div>
          <div class="sub">${planLabel}</div>
        </div>
        <div class="stat-card">
          <div class="label">Reports This Month</div>
          <div class="value">0</div>
          <div class="sub">Upload your first data</div>
        </div>
        <div class="stat-card">
          <div class="label">Health Score</div>
          <div class="value">—</div>
          <div class="sub">Complete setup to see score</div>
        </div>
        <div class="stat-card highlight">
          <div class="label">Next Delivery</div>
          <div class="value">—</div>
          <div class="sub">After first upload</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>Get started</h2></div>
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Export your orders, payouts, and fees from Shopify and upload them here. We'll deliver your P&L, Balance Sheet, and Cash Flow within 24 hours.</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <a href="/dashboard/upload" class="btn primary">Upload Data</a>
          <a href="/tools/" class="btn">Free Health Check</a>
          ${!isActive ? '<a href="/#pricing" class="btn accent">Upgrade Plan</a>' : ''}
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>📄 Your Reports</h2></div>
        <div class="empty-state">
          <div style="font-size:32px;margin-bottom:12px;opacity:0.3;">📊</div>
          <h3>No reports yet</h3>
          <p>Once you upload your Shopify data, your monthly reports will appear here. We deliver P&L, Balance Sheet, and Cash Flow within 24 hours.</p>
          <a href="/dashboard/upload" class="btn primary" style="margin-top:16px;">Upload Your First Data</a>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>📬 How You Receive Your Work</h2></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;">
          <div style="padding:16px;background:var(--bg-alt);border-radius:8px;text-align:center;">
            <div style="font-size:24px;margin-bottom:8px;">📊</div>
            <h3 style="font-size:13px;font-weight:500;margin-bottom:4px;">Profit & Loss</h3>
            <p style="font-size:12px;color:var(--text-muted);">Monthly P&L with every transaction categorized</p>
          </div>
          <div style="padding:16px;background:var(--bg-alt);border-radius:8px;text-align:center;">
            <div style="font-size:24px;margin-bottom:8px;">📋</div>
            <h3 style="font-size:13px;font-weight:500;margin-bottom:4px;">Balance Sheet</h3>
            <p style="font-size:12px;color:var(--text-muted);">Assets, liabilities, and equity — always up to date</p>
          </div>
          <div style="padding:16px;background:var(--bg-alt);border-radius:8px;text-align:center;">
            <div style="font-size:24px;margin-bottom:8px;">💵</div>
            <h3 style="font-size:13px;font-weight:500;margin-bottom:4px;">Cash Flow</h3>
            <p style="font-size:12px;color:var(--text-muted);">See why cash is tight even when sales are up</p>
          </div>
        </div>
        <p style="font-size:12px;color:var(--text-dim);margin-top:12px;text-align:center;">All reports delivered as clean Google Sheets within 24 hours of upload</p>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>Account</h2></div>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
          <div style="width:40px;height:40px;border-radius:50%;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;color:var(--text);">${profile.name.charAt(0).toUpperCase()}</div>
          <div>
            <div style="font-size:14px;color:var(--text);font-weight:500;">${profile.name}</div>
            <div style="font-size:12px;color:var(--text-dim);">${profile.email}</div>
          </div>
        </div>
        <a href="/dashboard/settings" class="btn sm">Edit Profile</a>
      </div>
    `;
  });
</script>
</body>
</html>
