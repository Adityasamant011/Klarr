<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up | Klarr</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=18">
  <style>
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 80px 24px 40px; }
    .auth-card { width: 100%; max-width: 400px; }
    .auth-card h1 { font-size: 1.4rem; font-weight: 600; color: var(--text); margin-bottom: 8px; letter-spacing: -0.02em; }
    .auth-card .auth-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; line-height: 1.5; }
    .auth-field { margin-bottom: 16px; }
    .auth-field label { display: block; font-size: 11px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .auth-field input { width: 100%; padding: 10px 14px; background: var(--bg-alt); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 14px; font-family: inherit; }
    .auth-field input:focus { outline: none; border-color: var(--accent); }
    .auth-error { background: rgba(224, 80, 80, 0.1); border: 1px solid rgba(224, 80, 80, 0.2); border-radius: 4px; padding: 10px 14px; font-size: 13px; color: #e05050; margin-bottom: 16px; display: none; }
    .auth-btn { width: 100%; padding: 12px; background: var(--text); color: var(--bg); border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
    .auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .auth-divider span { font-size: 12px; color: var(--text-dim); }
    .google-btn { width: 100%; padding: 12px; background: var(--bg-alt); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 14px; font-weight: 400; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .google-btn:hover { border-color: var(--text-dim); }
    .google-btn svg { width: 18px; height: 18px; }
    .auth-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-muted); }
    .auth-footer a { color: var(--text); text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .auth-hint { font-size: 12px; color: var(--text-dim); margin-top: -8px; margin-bottom: 16px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="/" class="logo"><img src="/favicon.svg" alt="Klarr"><span>Klarr</span></a>
      <div class="nav-links">
        <a href="/#features">Features</a>
        <a href="/#pricing">Pricing</a>
        <a href="/blog/">Blog</a>
        <a href="/partners/">Partners</a>
      </div>
      <div class="nav-right" id="nav-auth-area"></div>
    </div>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="auth-sub">Get started with Klarr. Know your real profit margin in 24 hours.</p>

      <div class="auth-error" id="signup-error"></div>

      <form id="signup-form">
        <div class="auth-field">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Your name" required>
        </div>
        <div class="auth-field">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required>
        </div>
        <div class="auth-field">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" required>
        </div>
        <div class="auth-field">
          <label>Confirm Password</label>
          <input type="password" id="signup-confirm" placeholder="Repeat password" required>
        </div>
        <p class="auth-hint">By signing up, you agree to our Terms of Service.</p>
        <button type="submit" class="auth-btn" id="signup-btn">Create Account</button>
      </form>

      <div class="auth-divider"><span>or</span></div>

      <button class="google-btn" id="google-signup-btn">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign up with Google
      </button>

      <div class="auth-footer">
        Already have an account? <a href="/login">Log in</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { updateNav, setupSignupForm, redirectIfAuthed } from '/auth.js';
    import { handleGoogleRedirect } from '/partners/firebase-init.js';
    updateNav();
    redirectIfAuthed('/dashboard');
    setupSignupForm();
    handleGoogleRedirect().then(user => {
      if (user) window.location.href = '/dashboard';
    });
  </script>
</body>
</html>
