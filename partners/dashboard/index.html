<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Dashboard | Klarr</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=15">
  <link rel="stylesheet" href="/css/dashboard.css?v=1">
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js?042c9428"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js?042c9428"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js?042c9428"></script>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="icon-chart" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></symbol>
  <symbol id="icon-users" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
  <symbol id="icon-wallet" viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4h-4z"/></symbol>
  <symbol id="icon-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
  <symbol id="icon-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></symbol>
  <symbol id="icon-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></symbol>
  <symbol id="icon-x" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
  <symbol id="icon-home" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>
  <symbol id="icon-dollar" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></symbol>
  <symbol id="icon-menu" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></symbol>
</svg>

<div class="dash-layout">
  <div class="dash-sidebar">
    <div class="brand"><a href="/"><img src="/favicon.svg" alt="Klarr"> Klarr Partner</a></div>
    <div class="section-label">Dashboard</div>
    <a href="#" class="active">📊 Overview</a>
    <a href="/partners/">🏠 Partner Program</a>
  </div>
  <div class="dash-main" id="dash-content">
    <div style="text-align:center;padding:60px;color:var(--text-dim);">Loading...</div>
  </div>
</div>

<script type="module">
  const params = new URLSearchParams(window.location.search);
  const partnerId = params.get('id');

  if (!partnerId) {
    document.getElementById('dash-content').innerHTML = '<div class="empty-state"><p>No partner ID. <a href="/partners/">Sign up</a> or <a href="/partners/login">log in</a>.</p></div>';
  } else {
    loadDashboard();
  }

  async function loadDashboard() {
    try {
      const { getPartnerStats, createPayoutRequest, getAllPartners } = await import('https://klarr.space/partners/firebase-init.js');
      const stats = await getPartnerStats(partnerId);
      if (!stats) { document.getElementById('dash-content').innerHTML = '<div class="empty-state"><p>Partner not found.</p></div>'; return; }

      const allData = await getAllPartners();
      const partner = allData.partners.find(p => p.id === partnerId);
      const refLink = 'https://klarr.space/?ref=' + partnerId;
      const balance = parseFloat(stats.earnings).toFixed(2);
      const canPayout = parseFloat(balance) >= 25;

      let refRows = '';
      if (stats.referrals.length === 0) {
        refRows = '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-dim);">No signups yet. Share your link!</td></tr>';
      } else {
        refRows = stats.referrals.map(r => {
          const d = r.createdAt?.toDate ? r.createdAt.toDate().toLocaleDateString() : '—';
          const sc = r.status === 'active' ? '#52c878' : (r.status === 'paid' ? '#8b8880' : '#b8860b');
          return '<tr><td>' + d + '</td><td>' + r.email.split('@')[0] + '</td><td>' + r.plan + '</td><td style="color:' + sc + '">' + r.status + '</td><td style="color:var(--accent)">$' + r.commission.toFixed(2) + '/mo</td></tr>';
        }).join('');
      }

      document.getElementById('dash-content').innerHTML = `
        <div class="dash-topbar">
          <div><h1>Partner Dashboard</h1><p class="subtitle">Welcome, ${partner ? partner.name : 'Partner'}</p></div>
          <a href="/partners/" style="font-size:13px;color:var(--accent);text-decoration:none;">← Partner Page</a>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><div class="label">Clicks</div><div class="value">${stats.clicks}</div></div>
          <div class="stat-card"><div class="label">Signups</div><div class="value">${stats.signups}</div></div>
          <div class="stat-card"><div class="label">Active</div><div class="value">${stats.active}</div></div>
          <div class="stat-card highlight"><div class="label">Monthly Earnings</div><div class="value">$${stats.earnings}/mo</div></div>
        </div>
        <div class="panel">
          <div class="panel-header"><h2>Your Referral Link</h2></div>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="text" value="${refLink}" readonly id="ref-link-input" class="form-control" style="flex:1;">
            <button class="btn sm" onclick="copyRefLink()">Copy</button>
          </div>
          <p style="font-size:12px;color:var(--text-dim);margin-top:8px;">Share anywhere. 90-day cookie. 20% recurring on all plans.</p>
        </div>
        <div class="panel">
          <div class="panel-header"><h2>Earnings</h2></div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div><div style="font-size:1.5rem;font-weight:600;color:var(--accent);">$${balance}</div><div style="font-size:12px;color:var(--text-dim);">Available Balance</div></div>
            <button class="btn accent" id="btn-payout" ${canPayout ? '' : 'disabled'}>Request Payout</button>
          </div>
          ${!canPayout ? '<p style="font-size:12px;color:var(--text-dim);margin-top:12px;">Minimum payout is $25. You need $' + (25 - parseFloat(balance)).toFixed(2) + ' more.</p>' : ''}
        </div>
        <div class="panel">
          <div class="panel-header"><h2>Your Referrals</h2></div>
          <table><thead><tr><th>Date</th><th>User</th><th>Plan</th><th>Status</th><th>You Earn</th></tr></thead><tbody>${refRows}</tbody></table>
        </div>
      `;

      if (canPayout) {
        document.getElementById('btn-payout').onclick = async function() {
          if (!confirm('Request $' + balance + ' payout?')) return;
          try {
            await createPayoutRequest(partnerId, parseFloat(balance));
            document.getElementById('btn-payout').disabled = true;
            document.getElementById('btn-payout').textContent = 'Payout Requested';
            alert('Payout requested! You will receive $' + balance + ' via PayPal or bank transfer within 7 business days.');
          } catch (e) { alert('Error: ' + e.message); }
        };
      }
    } catch (e) {
      document.getElementById('dash-content').innerHTML = '<div class="empty-state"><p>Error loading data: ' + e.message + '</p></div>';
      console.error(e);
    }
  }

  window.copyRefLink = function() {
    navigator.clipboard.writeText(document.getElementById('ref-link-input').value);
    var btn = document.querySelector('#ref-link-input + button');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  };
</script>
</body>
</html>
