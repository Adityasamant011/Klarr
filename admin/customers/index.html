<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Customers | Klarr</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=18">
  <link rel="stylesheet" href="/css/dashboard.css?v=4">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="toast-container" id="toast-container"></div>
<div class="dash-layout">
  <div class="dash-sidebar" id="sidebar">
    <div class="brand"><a href="/"><img src="/favicon.svg" alt="Klarr"> Klarr Admin</a></div>
    <div class="nav-section">
      <a href="/admin/"><span class="nav-icon">📤</span> Uploads</a>
      <a href="/admin/customers" class="active"><span class="nav-icon">👥</span> Customers</a>
      <a href="/"><span class="nav-icon">🏠</span> Back to Site</a>
    </div>
  </div>
  <div class="dash-main">
    <div class="page-header">
      <div><h1>👥 Customers</h1><p class="page-subtitle">All registered customers</p></div>
    </div>
    <div class="panel">
      <div id="customers-table"><p style="font-size:13px;color:var(--text-muted);">Loading...</p></div>
    </div>
  </div>
</div>
<script>
var firebaseConfig = {apiKey:"AIzaSyB65lbtE-2TbfC6XzQ8_zHsu-zh0ch4UR4",authDomain:"klarr-fa508.firebaseapp.com",projectId:"klarr-fa508",storageBucket:"klarr-fa508.firebasestorage.app",messagingSenderId:"1059958349807",appId:"1:1059958349807:web:56a25844725fce7183e01a"};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.firestore();

function showToast(msg, type) {
  var c = document.getElementById('toast-container');
  if (!c) { alert(msg); return; }
  var t = document.createElement('div');
  t.className = 'toast ' + (type || 'info');
  t.innerHTML = (type === 'success' ? '✅ ' : type === 'error' ? '❌ ' : 'ℹ️ ') + msg;
  c.appendChild(t);
  setTimeout(function(){t.style.opacity='0';setTimeout(function(){t.remove();},300);},4000);
}

auth.onAuthStateChanged(function(user) {
  if(!user) { window.location.href = '/login?redirect=' + encodeURIComponent('/admin/customers'); return; }
  db.collection('customers').doc(user.uid).get().then(function(doc){
    if(!doc.exists || doc.data().role !== 'admin') {
      document.getElementById('customers-table').innerHTML = '<div class="empty-state"><div class="empty-icon">🔒</div><h3>Admin only</h3></div>';
      return;
    }
    loadCustomers();
  });
});

function loadCustomers() {
  db.collection('customers').orderBy('createdAt','desc').get().then(function(snap){
    if(snap.empty) {
      document.getElementById('customers-table').innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><p>No customers yet.</p></div>';
      return;
    }
    var html = '<table><thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Status</th><th>Joined</th></tr></thead><tbody>';
    snap.docs.forEach(function(doc){
      var d = doc.data();
      var date = d.createdAt && d.createdAt.toDate ? d.createdAt.toDate().toLocaleDateString() : '—';
      var planColor = d.plan && d.plan !== 'none' ? '#52c878' : '#8b8880';
      html += '<tr><td>' + (d.name || '—') + '</td><td>' + d.email + '</td><td style="color:' + planColor + ';">' + (d.plan || 'none') + '</td><td>' + (d.status || 'active') + '</td><td>' + date + '</td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('customers-table').innerHTML = html;
  }).catch(function(e){
    console.error(e);
    document.getElementById('customers-table').innerHTML = '<p style="color:#e05050;">Error loading customers.</p>';
  });
}
</script>
</body>
</html>
