<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Klarr</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css?v=15">
  <link rel="stylesheet" href="/css/dashboard.css?v=1">
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="icon-chart" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 5-5"/></symbol>
  <symbol id="icon-users" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></symbol>
  <symbol id="icon-partners" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></symbol>
  <symbol id="icon-wallet" viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4h-4z"/></symbol>
  <symbol id="icon-settings" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></symbol>
  <symbol id="icon-home" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></symbol>
  <symbol id="icon-check" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></symbol>
  <symbol id="icon-x" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
  <symbol id="icon-alert" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></symbol>
  <symbol id="icon-menu" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></symbol>
  <symbol id="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></symbol>
  <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></symbol>
  <symbol id="icon-trash" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></symbol>
  <symbol id="icon-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
</svg>

<div class="dash-layout">
  <div class="dash-sidebar">
    <div class="brand"><a href="/"><img src="/favicon.svg" alt="Klarr"> Klarr Admin</a></div>
    <div class="section-label">Main</div>
    <a href="/admin/" class="active"><svg class="icon"><use href="#icon-chart"/></svg> Overview</a>
    <a href="/admin/users.html"><svg class="icon"><use href="#icon-users"/></svg> Users</a>
    <a href="/admin/partners.html"><svg class="icon"><use href="#icon-partners"/></svg> Partners</a>
    <a href="/admin/payouts.html"><svg class="icon"><use href="#icon-wallet"/></svg> Payouts</a>
    <div class="section-label">Settings</div>
    <a href="/admin/settings.html"><svg class="icon"><use href="#icon-settings"/></svg> Site Settings</a>
    <a href="/"><svg class="icon"><use href="#icon-home"/></svg> Back to Site</a>
  </div>

  <div class="main" id="main-content">
    <div style="text-align:center;padding:60px;color:var(--text-dim);">Loading dashboard...</div>
  </div>
</div>

<script type="module">
  import { auth, onAuthStateChanged, getCustomerProfile } from '/partners/firebase-init.js';
  import { updateNav } from '/auth.js';
  import { getAllPartners } from '/partners/firebase-init.js';
  import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const db = getFirestore();
  updateNav();

  async function init() {
    if (auth.currentUser) {
      const profile = await getCustomerProfile(auth.currentUser.uid);
      if (!profile || profile.role !== 'admin') { window.location.href = '/dashboard.html'; return; }
      await loadDashboard();
    } else {
      onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = '/login.html?redirect=/admin/'; return; }
        const profile = await getCustomerProfile(user.uid);
        if (!profile || profile.role !== 'admin') { window.location.href = '/dashboard.html'; return; }
        await loadDashboard();
      });
    }
  }
  init();

  async function loadDashboard() {
    try {
      const [partnersData, customersSnap] = await Promise.all([
        getAllPartners(),
        getDocs(collection(db, 'customers'))
      ]);
      const customers = customersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
      const totalCustomers = customers.filter(c => c.role !== 'admin').length;
      const activeSubs = customers.filter(c => c.plan && c.plan !== 'none' && c.plan !== 'admin').length;
      const totalPartners = partnersData.partners.length;
      const totalReferrals = partnersData.referrals.length;
      const totalEarnings = partnersData.referrals.reduce((s, r) => s + (r.commission || 0), 0);
      const pendingPayouts = partnersData.payouts ? partnersData.payouts.filter(p => p.status === 'pending').length : 0;

      document.getElementById('main-content').innerHTML = `
        <div class="dash-topbar">
          <div><h1>Dashboard</h1><p class="subtitle">Welcome back. Here's what's happening.</p></div>
          <span style="font-size:12px;color:var(--text-dim);">${new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}</span>
        </div>
        <div class="stats-grid">
          <div class="stat-card"><div class="label">Total Users</div><div class="value">${totalCustomers}</div><div class="sub">Registered accounts</div></div>
          <div class="stat-card"><div class="label">Active Subscriptions</div><div class="value">${activeSubs}</div><div class="sub">Paying customers</div></div>
          <div class="stat-card"><div class="label">Partners</div><div class="value">${totalPartners}</div><div class="sub">${totalReferrals} referrals</div></div>
          <div class="stat-card highlight"><div class="label">Total Commissions</div><div class="value">$${totalEarnings.toFixed(0)}</div><div class="sub">${pendingPayouts} pending payouts</div></div>
        </div>
        <div class="panel">
          <div class="panel-header"><h2>Recent Partners</h2></div>
          <table>
            <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Referrals</th><th>Earnings</th></tr></thead>
            <tbody>
              ${partnersData.partners.slice(0, 10).map(p => {
                const refs = partnersData.referrals.filter(r => r.partnerId === p.id);
                const earnings = refs.reduce((s, r) => s + (r.commission || 0), 0);
                return `<tr><td><strong>${p.name}</strong></td><td>${p.email}</td><td>${p.role || '—'}</td><td>${refs.length}</td><td style="color:var(--accent)">$${earnings.toFixed(2)}/mo</td></tr>`;
              }).join('') || '<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--text-dim);">No partners yet</td></tr>'}
            </tbody>
          </table>
        </div>
      `;
    } catch (e) {
      document.getElementById('main-content').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${e.message}</p></div>`;
      console.error(e);
    }
  }
</script>
</body>
</html>
